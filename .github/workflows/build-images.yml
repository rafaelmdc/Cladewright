# Build + push the three Cladewright images to Docker Hub. Argo CD's image-updater watches
# the `latest` tag (digest strategy) and rolls the cluster — see docs/deployment.md.
#
# Repo secrets required:
#   DOCKERHUB_USERNAME  (e.g. hydrodog11)
#   DOCKERHUB_TOKEN     (a Docker Hub access token)
name: build-images

on:
  push:
    branches: [main, phase-1-pipeline]
    tags: ["v*"]  # a release tag (v0.1.0) builds an image stamped with that version
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cladewright            # Django web (gunicorn)
            context: backend
            dockerfile: backend/Dockerfile
          - image: cladewright-pipeline   # Celery worker (Braidworks + dump)
            context: backend
            dockerfile: backend/Dockerfile.pipeline
          - image: cladewright-frontend   # Vite SPA on nginx
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so `git describe` can resolve a version

      # The version stamped into the images and shown in the site footer / admin. Prefers
      # the nearest git tag (e.g. v1.2.0, or v1.2.0-3-gabc1234 a few commits on); falls back
      # to the short commit SHA when there are no tags yet. So `git tag v1.0.0 && git push
      # --tags` is all it takes to start showing real release numbers.
      - id: ver
        run: |
          echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
          echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
            BUILD_TIME=${{ steps.ver.outputs.built }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
