# Build + push the three Cladewright images to Docker Hub. Argo CD's image-updater watches
# the `latest` tag (digest strategy) and rolls the cluster — see docs/deployment.md.
#
# Repo secrets required:
#   DOCKERHUB_USERNAME  (e.g. hydrodog11)
#   DOCKERHUB_TOKEN     (a Docker Hub access token)
name: build-images

on:
  push:
    branches: [main, phase-1-pipeline]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: cladewright            # Django web (gunicorn)
            context: backend
            dockerfile: backend/Dockerfile
          - image: cladewright-pipeline   # Celery worker (Braidworks + dump)
            context: backend
            dockerfile: backend/Dockerfile.pipeline
          - image: cladewright-frontend   # Vite SPA on nginx
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
