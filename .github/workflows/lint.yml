# Automatic linting on every PR + branch push (NOT main image builds — that's
# build-images.yml). Backend: ruff. Frontend: eslint + tsc typecheck. See GitHub issue #66.
name: lint

on:
  pull_request:
  push:
    branches-ignore: [main, phase-1-pipeline]  # those push images; lint already ran on the PR

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint   # eslint . && tsc --noEmit
        working-directory: frontend
