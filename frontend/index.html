<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply the saved theme before first paint so there's no flash of the default. -->
    <script>
      try {
        var t = localStorage.getItem("cladewright.theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/leaf.svg" />
    <title>Cladewright</title>
    <meta
      name="description"
      content="The tree of life, as a game — name every branch before the clock runs out."
    />
    <!-- Open Graph / Twitter: pretty link previews. og.png is the symbol + wordmark (1200×630). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cladewright" />
    <meta property="og:title" content="Cladewright" />
    <meta
      property="og:description"
      content="The tree of life, as a game — name every branch before the clock runs out."
    />
    <meta property="og:url" content="https://cladewright.duarte-correia.pt/" />
    <meta property="og:image" content="https://cladewright.duarte-correia.pt/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cladewright" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cladewright" />
    <meta
      name="twitter:description"
      content="The tree of life, as a game — name every branch before the clock runs out."
    />
    <meta name="twitter:image" content="https://cladewright.duarte-correia.pt/og.png" />
    <!-- Umami: self-hosted, cookieless analytics (rafael-analytics.duarte-correia.pt). -->
    <script
      defer
      src="https://rafael-analytics.duarte-correia.pt/script.js"
      data-website-id="6df0985f-101a-4766-ad79-48f6cb9f7770"
    ></script>
    <!-- Field-notebook type: Caveat (handwriting display) + Space Mono (typewriter captions) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
