# Serves the Vite SPA only — static files + client-side-routing fallback. The API/auth are
# NOT proxied here: the Gateway/HTTPRoute routes /api and /accounts straight to the Django
# web Service (same public host, so Django sees first-party callbacks/CSRF). Keeping nginx
# static-only avoids an upstream-DNS dependency at pod start. See docs/deployment.md.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Content-hashed Vite assets → cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA client-side routing: everything falls back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
